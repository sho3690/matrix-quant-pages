name: update-data

on:
  schedule:
    # JST 6:23 / 9:23 / 12:23 / 15:23 / 18:23 / 21:23 (cronŃü»UTC)
    - cron: "23 21,0,3,6,9,12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency: update-data

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python generate.py
      - name: commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data data
          git diff --cached --quiet || git commit -m "data: auto update"
          git push
